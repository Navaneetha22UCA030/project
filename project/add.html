      $(document).on("change", ".price, .quantity, .gst", function () {

        var quantity = parseFloat(form.find(".quantity").val()) || 0;
        var gst = parseFloat(form.find(".gst").val()) || 0;

        var totalAmount = price * quantity + (price * quantity * gst) / 100;
